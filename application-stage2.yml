info:
  app:
    name: usp-financial-reporting-service
    description: usp-financial-reporting-service ${ENV}
    version: 1.0.0

spring:
  mvc:
    servlet:
      path: /services/edelivery/uspfinancialreporting/v1
  cloud:
    compatibility-verifier:
      enabled: false
    bus:
      id: usp-financial-reporting-service:${ENV}
      enabled: true
  main:
    allow-bean-definition-overriding: true
  datasource:
    hikari:
      connection-timeout: 20000
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 10000
      max-lifetime: 30000
      auto-commit: true
      schema: edelivery
      data-source-properties: stringtype=unspecified
    tomcat:
      connection-properties: stringtype=unspecified
  thymeleaf:
    prefix: classpath:/mail-templates/
    suffix: .html
  jpa:
    hibernate:
    show-sql: true
  kafka:
    properties:
      groupid: cg-usp-financial-reporting-${APP}-${ENV}
      autoRegisterSchemas: false
      useLatestVersion: true
      maxpollrecord: 5
      sendRetry:
        retryAttempts: 5
        retryDelayTime: 3000
      dlt:
        enabled: true
        maxAttempts: 3
        dltInterval: 10000
        autoCreateTopics: false
        retryTopicSuffix: -retry
        dltTopicSuffix: -dlt
        fixedDelayStrategy: SINGLE_TOPIC
        dltStrategy: ALWAYS_RETRY_ON_ERROR
        dltHandlerMethodName: consumeDlt
        createdBy: "usp-financial-reporting-service"
      bootstrap:
        servers:
          producer: ehns-${APP}-${ENV}.servicebus.windows.net:9093
          consumer: ehns-${APP}-${ENV}.servicebus.windows.net:9093
      schema:
        registry:
          url: https://ehns-${APP}-${ENV}.servicebus.windows.net
        group: edelivery_avro_hse
      use:
        managed:
          identity:
            credential: 'true'

health:
  config:
    enabled: true
  binders:
    enabled: false

server:
  connection-timeout: 0
  tomcat:
    accept-count: 2
    max-connections: 30
    max-threads: 30
    min-spare-threads: 20

scheduler:
  poll:
    fetchUSP3696Data: "0 0 0 * * *"
    fetchUSP3231Data: "0 10 0 * * *"
    servicename: usp-financial-reporting-service

ness:
  logger:
    askID: UHGWM110-026282
    applicationName: USP-financial-reporting-service
    deviceVendor: Vendor
    deviceProduct: Product

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: info, health, env, metrics, bus-refresh, bus-refresh-destination
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
    health:
      show-details: always

edelivery:
  configproperties:
    properties:
      USP3231:
        DateFilter: " = current_date - 2 "
        minusDays: 2
      USP3696:
        DateFilter: " = current_date - 2 "
        minusDays: 2
      edeliveryEmail:
        environment: ENV_${ENV}
        alertDistributionEmails: Quadient@ds.uhc.com
        distributionEmails: QuadientMonitor@ds.uhc.com
      TxStatusUpdate:
        DayUpdateTxStatus: 2
      onDemandOrxApi:
        orxOnDemandUrl: https://gateway-stage.optum.com/api/tsd/ccs/comm/orxccm/inspireintake/v1
        commFamily: "QUADIENT HSE - PENG - QHSE"
      batchConsolidationOrxApi:
        orxBatchApiUri: https://gateway-stage.optum.com/api/tsd/ccs/comm/orxccm/inspireintake/v1
        commFamily: "QUADIENT HSE - PENG - QHSE"
      batchDeliveryWithOrx:
        orxBatchDeliveryApiUri: https://gateway-stage.optum.com/api/tsd/ccs/comm/orxccm/inspireintake/v1
        commFamily: "QUADIENT HSE - PENG - QHSE"

logging:
  file:
    name: "/logs/usp-financial-reporting/usp-financial-reporting-${COMPUTERNAME}.log"
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "${WEBSITE_INSTANCE_ID}-%d{HH:mm:ss.SSS} [%thread] %level %class - %M %L - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: "/logs/archive/usp-financial-reporting/%d{yyyy-MM-dd}.%i.usp-financial-reporting_${COMPUTERNAME}.log.gz"
      max-file-size: 10MB
      max-history: 30
  level:
    root: INFO
    com:
      uhg:
        comm:
          edelivery: DEBUG
      optum:
        eis:
          kraken: ERROR
      azure:
        core:
          amqp: ERROR
        messaging: ERROR
    org:
      apache:
        kafka: ERROR

blobconsumer:
  config:
    bootstrapconfig: ehns-${APP}-${ENV}.servicebus.windows.net:9093
    groupid: cg-usp3231onprem-${APP}-${ENV}
    blob-topic: eh-usp3231onPrem-${APP}-${ENV}

blobclient:
  containerName: cont-${APP}-${ENV}
  endpoint: https://st${APP}${ENV}.blob.core.windows.net
  pdfContainerName: cont-${APP}-${ENV}-pdf-sampling
  extcontainerName: cont-ext-${APP}-${ENV}
  extendpoint: https://stexternal${APP}${ENV}.blob.core.windows.net
  chatBotStorageEndPoint: https://ucshub7781685541.blob.core.windows.net
  imageContainer: image-output-container

azuremail:
  granttype: client_credentials
  scope: https://graph.microsoft.com/.default

webclient:
  timeout:
    connect: 20000
    response: 20000
    read: 20000
    write: 20000

oAuth:
  uri: https://gateway-stage.optum.com/auth/oauth2/token

filePath:
  ucsFilePath: quadient/samplingPDF/pt3696
  chatBotJsonPath: chatbot/json/chatbotQandA.json

openai:
  url: https://openai-ecedel-aipoc.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2024-12-01-preview
  endpoint: https://aisearch-ecedel-aipoc.search.windows.net
  
  knowledgeSearch:
    queryType: semantic
    semanticConfiguration: multimodal-rag-1757504685106-knowledge-semantic-configuration
    inScope: false
    strictness: 1
    indexName: multimodal-rag-1757504685106-knowledge
    topNDocuments: 25
    temperature: 0.15
    maxTokens: 4096
    topP: 0.95
    roleInformation: >-
      You are an EXPERT AI assistant for system architecture, print trails, and technical documentation with ONE PRIMARY DIRECTIVE: PROVIDE COMPLETE, EXHAUSTIVE, COMPREHENSIVE ANSWERS WITH ZERO INCOMPLETENESS. === MANDATORY COMPLETENESS REQUIREMENTS (NON-NEGOTIABLE) === 1. COMPLETE LISTS ALWAYS: When asked 'which trails', 'what services', 'list all', 'show me' you must provide EVERY SINGLE ITEM. Giving 3 items when 9 exist is STRICTLY FORBIDDEN. Giving 5 items when 12 exist is UNACCEPTABLE. 'Here are some examples...' is BANNED when user wants complete list. Default assumption: User wants EVERYTHING not samples. 2. EXHAUSTIVE DOCUMENT REVIEW: Read ALL retrieved documents COMPLETELY before answering. Don't stop after 2-3 documents - read doc 1, 2, 3, 4, 5... up to last one. Each document may contain unique information. Documents ranked 20-25 might have critical data. 3. AGGREGATE ALL INFORMATION: If doc1 has PT3231+PT3299, doc2 has PT3450, doc3 has PT3599 then answer must include ALL FOUR. Combine data from ALL documents into one comprehensive answer. Cross-reference between documents. 4. SMART INTERPRETATION: 'Which trails use TXT files?' means search for file format, input type, file extension, text files, flat files, .txt. Use synonyms, related terms, contextual understanding. 5. VERIFICATION BEFORE RESPONDING: Ask yourself: Did I read EVERY retrieved document? Did I extract EVERY matching item? Could there be more I missed? Did I count results? If uncertain re-read ALL documents. 6. CONVERSATION CONTEXT: Remember ALL previous messages. 'tell me more', 'expand', 'what about this' refer to previous topics. Understand 'it', 'this', 'that' from earlier discussion. Maintain context across unlimited turns. 7. FINAL CHECK: Count items - if listing trails and found 7, response must list all 7. Verify you answered COMPLETE question. Confirm you used ALL retrieved docs. CRITICAL: Partial answers requiring follow-up like 'are there more?' are FAILURES.

  monitoringSearch:
    queryType: semantic
    semanticConfiguration: multimodal-rag-1757502603097-monitoring-semantic-configuration
    inScope: false
    strictness: 1
    indexName: multimodal-rag-1757502603097-monitoring
    topNDocuments: 30
    temperature: 0.1
    maxTokens: 4096
    topP: 0.9
    roleInformation: >-
      You are an EXPERT AI assistant for production monitoring, diagnostics, and log analysis with ONE PRIMARY DIRECTIVE: PROVIDE COMPLETE EXHAUSTIVE diagnostic information with ZERO INCOMPLETENESS. === MANDATORY COMPLETENESS FOR MONITORING === 1. EXHAUSTIVE LOG ANALYSIS: Read ALL log entries not just first 5. Check ALL error records not 3 examples. Review ALL timestamps in time range. Examine ALL job IDs. Don't stop after first few errors. 2. COMPLETE DATA EXTRACTION: 'Which jobs failed?' means list EVERY failed job not samples. 'What errors occurred?' means ALL error types with counts. Aggregate from all 30 log documents. 3. PATTERN RECOGNITION: Identify ALL error codes not just common ones. Find ALL affected printrails. Detect ALL failure patterns. Correlate across logs. 4. VERIFICATION: Did I analyze EVERY log file (all 30)? Did I check EVERY time period? Did I identify EVERY error instance? Did I count and aggregate? FORBIDDEN: 'Here are some recent errors' when user wants ALL. REQUIRED: 'Total errors: 47. Breakdown: 404 (23), 500 (15), timeout (9)'

  rcaSearch:
    queryType: semantic
    semanticConfiguration: multimodal-rag-1757492757221-rca-semantic-configuration
    inScope: false
    strictness: 1
    indexName: multimodal-rag-1757492757221-rca
    topNDocuments: 30
    temperature: 0.1
    maxTokens: 4096
    topP: 0.95
    roleInformation: >-
      You are an EXPERT AI assistant for Root Cause Analysis with ONE PRIMARY DIRECTIVE: PROVIDE COMPLETE EXHAUSTIVE RCA information with ZERO INCOMPLETENESS. === MANDATORY COMPLETENESS FOR RCA === 1. EXHAUSTIVE RCA REVIEW: Read EVERY RCA document (all 30). Each may have unique insights. Look for patterns across incidents. 2. COMPLETE ROOT CAUSE IDENTIFICATION: List ALL root causes not just primary. Include immediate causes AND underlying causes. Trace to true root not just symptoms. 3. COMPREHENSIVE RCA FORMAT: Include complete timeline, ALL causes, ALL impacts, ALL actions, ALL prevention, ALL related incidents. 4. VERIFICATION: Did I read EVERY RCA? Did I identify ALL root causes? Did I include ALL actions? Did I reference ALL similar incidents? FORBIDDEN: 'The main cause was' when multiple exist. REQUIRED: 'Root causes (complete): 1) Immediate: X, 2) Contributing: Y, 3) Underlying: Z, 4) Systemic: W. Total: 4 factors.'

conversation:
  max:
    messages: 50
  cleanup:
    interval: 3600000
  session:
    timeout: 86400000
